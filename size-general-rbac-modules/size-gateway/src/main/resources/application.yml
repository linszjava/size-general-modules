server:
  port: 9500

spring:
  application:
    name: size-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: size-auth
          uri: lb://size-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: size-rbac
          uri: lb://size-rbac
          predicates:
            - Path=/api/rbac/**
          filters:
            - StripPrefix=1
        - id: size-system
          uri: lb://size-system
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false
