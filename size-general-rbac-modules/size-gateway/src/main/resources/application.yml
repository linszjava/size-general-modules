server:
  port: 9500

spring:
  application:
    name: size-gateway
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: size-auth
          uri: lb://size-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: size-rbac
          uri: lb://size-rbac
          predicates:
            - Path=/api/rbac/**
          filters:
            - StripPrefix=1
        - id: size-system
          uri: lb://size-system
          predicates:
            - Path=/api/system/**
          filters:
            - StripPrefix=1

sa-token:
  token-name: Authorization
  timeout: 86400
  is-read-header: true
  is-read-cookie: false

# Knife4j 网关聚合（统一入口 http://localhost:9500/doc.html）
knife4j:
  gateway:
    enabled: true
    strategy: manual
    tags-sorter: order
    operations-sorter: order
    routes:
      - name: 认证服务
        service-name: size-auth
        # 经网关 discovery locator 转发：/size-auth/** -> 下游 /v3/api-docs
        url: /size-auth/v3/api-docs
        context-path: /api
        order: 1
      - name: RBAC服务
        service-name: size-rbac
        url: /size-rbac/v3/api-docs
        context-path: /api
        order: 2
      - name: 系统服务
        service-name: size-system
        url: /size-system/v3/api-docs
        context-path: /api
        order: 3
